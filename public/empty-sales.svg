<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="tealGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F4C4B"/>
      <stop offset="100%" style="stop-color:#14919B"/>
    </linearGradient>
    <linearGradient id="goldGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8973E"/>
      <stop offset="100%" style="stop-color:#E8C56C"/>
    </linearGradient>
  </defs>
  <!-- Vintage cash register base -->
  <rect x="100" y="160" width="200" height="80" rx="10" fill="none" stroke="url(#tealGrad3)" stroke-width="2" opacity="0.6"/>
  <rect x="110" y="170" width="180" height="60" rx="6" fill="#0F4C4B" opacity="0.08"/>
  <!-- Register display -->
  <rect x="140" y="130" width="120" height="40" rx="6" fill="none" stroke="url(#tealGrad3)" stroke-width="1.5" opacity="0.5"/>
  <rect x="150" y="140" width="100" height="20" rx="3" fill="#0F4C4B" opacity="0.1"/>
  <!-- Number dials -->
  <circle cx="165" cy="180" r="12" fill="none" stroke="url(#goldGrad3)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="200" cy="180" r="12" fill="none" stroke="url(#goldGrad3)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="235" cy="180" r="12" fill="none" stroke="url(#goldGrad3)" stroke-width="1.2" opacity="0.5"/>
  <!-- Register keys -->
  <rect x="130" y="210" width="15" height="15" rx="3" fill="url(#tealGrad3)" opacity="0.3"/>
  <rect x="155" y="210" width="15" height="15" rx="3" fill="url(#tealGrad3)" opacity="0.3"/>
  <rect x="180" y="210" width="15" height="15" rx="3" fill="url(#tealGrad3)" opacity="0.3"/>
  <rect x="205" y="210" width="15" height="15" rx="3" fill="url(#tealGrad3)" opacity="0.3"/>
  <rect x="230" y="210" width="15" height="15" rx="3" fill="url(#tealGrad3)" opacity="0.3"/>
  <!-- Drawer -->
  <rect x="120" y="195" width="160" height="5" rx="2" fill="url(#goldGrad3)" opacity="0.3"/>
  <!-- Question mark -->
  <text x="280" y="110" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="48" fill="url(#goldGrad3)" opacity="0.5">?</text>
</svg>
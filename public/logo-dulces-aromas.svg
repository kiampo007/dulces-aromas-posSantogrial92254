<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8973E"/>
      <stop offset="50%" style="stop-color:#E8C56C"/>
      <stop offset="100%" style="stop-color:#C8973E"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F4C4B"/>
      <stop offset="100%" style="stop-color:#14919B"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
  <circle cx="100" cy="100" r="90" fill="#0F4C4B" opacity="0.15"/>
  <!-- Perfume bottle -->
  <g transform="translate(60, 45)">
    <!-- Bottle body -->
    <rect x="15" y="35" width="50" height="65" rx="8" fill="url(#tealGrad)" opacity="0.9"/>
    <!-- Bottle neck -->
    <rect x="30" y="20" width="20" height="18" rx="3" fill="url(#goldGrad)" opacity="0.8"/>
    <!-- Cap -->
    <rect x="27" y="8" width="26" height="16" rx="4" fill="url(#goldGrad)"/>
    <!-- Label -->
    <rect x="22" y="50" width="36" height="28" rx="4" fill="#F8F3ED" opacity="0.9"/>
    <text x="40" y="66" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#0F4C4B" font-weight="bold">DA</text>
    <text x="40" y="74" text-anchor="middle" font-family="Georgia, serif" font-size="4" fill="#C8973E">EST. 2020</text>
    <!-- Liquid level -->
    <rect x="17" y="55" width="46" height="43" rx="6" fill="url(#goldGrad)" opacity="0.25"/>
  </g>
  <!-- Flourishes -->
  <path d="M30 140 Q25 130 35 125 Q30 135 40 138" fill="none" stroke="#C8973E" stroke-width="1.2" opacity="0.7"/>
  <path d="M170 140 Q175 130 165 125 Q170 135 160 138" fill="none" stroke="#C8973E" stroke-width="1.2" opacity="0.7"/>
  <!-- Brand text -->
  <text x="100" y="155" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="14" font-weight="700" fill="#0F4C4B" letter-spacing="0.5">Dulces Aromas</text>
  <text x="100" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="500" fill="#C8973E" letter-spacing="3" text-transform="uppercase">PERFUMERÍA</text>
  <!-- Decorative dots -->
  <circle cx="48" cy="163" r="2" fill="#C8973E" opacity="0.5"/>
  <circle cx="152" cy="163" r="2" fill="#C8973E" opacity="0.5"/>
</svg>
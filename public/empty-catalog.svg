<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="tealGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F4C4B"/>
      <stop offset="100%" style="stop-color:#14919B"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8973E"/>
      <stop offset="100%" style="stop-color:#E8C56C"/>
    </linearGradient>
  </defs>
  <!-- Shelf -->
  <rect x="50" y="200" width="300" height="8" rx="2" fill="url(#tealGrad2)" opacity="0.6"/>
  <rect x="60" y="208" width="280" height="4" rx="1" fill="#0F4C4B" opacity="0.3"/>
  <!-- Shelf supports -->
  <rect x="80" y="212" width="8" height="30" rx="2" fill="url(#tealGrad2)" opacity="0.5"/>
  <rect x="312" y="212" width="8" height="30" rx="2" fill="url(#tealGrad2)" opacity="0.5"/>
  <!-- Spotlight -->
  <polygon points="120,20 180,200 60,200" fill="url(#goldGrad2)" opacity="0.08"/>
  <!-- Single perfume bottle on shelf -->
  <g transform="translate(155, 130)">
    <rect x="15" y="40" width="30" height="30" rx="5" fill="url(#tealGrad2)" opacity="0.7"/>
    <rect x="23" y="25" width="14" height="18" rx="2" fill="url(#goldGrad2)" opacity="0.6"/>
    <rect x="21" y="18" width="18" height="10" rx="3" fill="url(#goldGrad2)" opacity="0.8"/>
  </g>
  <!-- Dust particles -->
  <circle cx="100" cy="80" r="2" fill="#C8973E" opacity="0.3"/>
  <circle cx="280" cy="120" r="1.5" fill="#C8973E" opacity="0.25"/>
  <circle cx="200" cy="60" r="1" fill="#C8973E" opacity="0.35"/>
  <circle cx="320" cy="90" r="2" fill="#0F4C4B" opacity="0.2"/>
  <circle cx="150" cy="100" r="1.5" fill="#0F4C4B" opacity="0.25"/>
  <circle cx="250" cy="70" r="1" fill="#C8973E" opacity="0.3"/>
</svg>